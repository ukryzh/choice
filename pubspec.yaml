name: choice
description: Privacy-preserving menstrual tracker rebuilt from FlutterFlow.

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.3
  tutorial_coach_mark: ^1.2.11
  file_picker: ^8.1.6
  table_calendar: ^3.2.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  intl: ^0.20.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.4
  equatable: ^2.0.5
  uuid: ^4.4.2
  crypto: ^3.0.5
  google_sign_in: ^6.2.1
  pdf: ^3.11.0
  share_plus: ^7.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/
  